<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/mark.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head>
<body>

    <header class="header">
        <div class="logo"><a href="index.html">穿行</a></div>
        <nav class="nav">
            <a href="index.html" style="font-size: 0.9rem; display: flex; align-items: center;">
                <i data-feather="arrow-left" style="width: 16px; margin-right: 4px;"></i> 返回
            </a>
            <button class="nav-icon-btn" onclick="toggleTheme()" title="日/夜模式">
                <i data-feather="moon" id="themeIcon" width="18"></i>
            </button>
        </nav>
    </header>

    <div style="max-width: 900px; margin: 40px auto; padding: 0 20px;">
        <div class="article-header">
            <h1 id="articleTitle">加载中...</h1>
            <div id="articleMeta" style="text-align: center; color: var(--text-secondary); margin-bottom: 40px; font-family: var(--font-sans);"></div>
        </div>

        <div class="markdown-body" id="content">
            </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get("file");
        const keyword = params.get("keyword"); 

        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            feather.replace();
            
            if(fileName) await loadArticle(fileName);
        });

        // --- 1. 文章加载与渲染 ---
        async function loadArticle(file) {
            try {
                // 获取 Markdown文本
                const res = await fetch(`Article/${file}`);
                if (!res.ok) throw new Error("Markdown file not found");
                let text = await res.text();
                // 自动修正图片路径
                text = text.replace(/\]\(image\//g, '](Article/image/')
                // 获取元数据
                const jsonRes = await fetch('articles.json');
                const data = await jsonRes.json();
                const articles = data.nodes || []; 
                const meta = articles.find(a => a.file === file);
                // 渲染
                const contentEl = document.getElementById('content');
                contentEl.innerHTML = marked.parse(text);
                
                // 渲染数学公式 (KaTeX)
                renderMathInElement(contentEl, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });

                // 关键词高亮
                if (keyword) {
                    const instance = new Mark(contentEl);
                    instance.mark(keyword, { 
                        element: "mark", 
                        className: "highlight" 
                    });
                    setTimeout(() => {
                        const firstMark = document.querySelector('mark');
                        if(firstMark) firstMark.scrollIntoView({behavior: "smooth", block: "center"});
                    }, 500);
                }

                // 填充文章元数据
                if(meta) {
                    document.title = meta.title;
                    document.getElementById('articleTitle').innerText = meta.title;
                    document.getElementById('articleMeta').innerHTML = `
                        <span>${meta.date}</span> &middot; 
                        ${(meta.tags||[]).map(t => `<span class="article-tag">#${t}</span>`).join(' ')}
                    `;
                }
                
            } catch(e) {
                document.getElementById('content').innerHTML = `
                    <div style="text-align:center; padding: 50px; color: var(--text-secondary);">
                        <p>文章加载失败，可能路径已迷失。</p>
                        <small style="opacity: 0.6;">Error: ${e.message}</small>
                    </div>
                `;
                console.error("Load Error:", e);
            }
        }
        // --- 2. 基础功能：主题切换 ---
        function initTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) document.body.classList.add('dark-mode');
            updateThemeIcon();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.body.classList.contains('dark-mode') ? 'sun' : 'moon';
            document.getElementById('themeIcon').innerHTML = feather.icons[icon].toSvg({ width: 18 });
        }
    </script>
</body>
</html>
