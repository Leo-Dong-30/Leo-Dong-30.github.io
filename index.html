<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穿行冷风</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <header class="header" id="mainHeader">
        <div class="logo">
            <i data-feather=""></i> <a href="index.html">穿行</a>
        </div>
        
        <nav class="nav">
            <button class="nav-icon-btn active" id="btnGraph" onclick="switchView('graph')" title="知识星空">
                <i data-feather="share-2" width="18"></i>
            </button>
            <button class="nav-icon-btn" id="btnTimeline" onclick="switchView('timeline')" title="徒步路径">
                <i data-feather="list" width="18"></i>
            </button>
            
            <div class="nav-divider"></div>

            <button class="nav-icon-btn" onclick="toggleTheme()" title="日/夜模式">
                <i data-feather="moon" id="themeIcon" width="18"></i>
            </button>
        </nav>
    </header>

    <div class="search-wrapper">
        <div class="search-container">
            <div class="search-input-group">
                <input type="text" id="searchInput" placeholder="SEARCH ARTICLES...">
                <div class="search-focus-line"></div>
            </div>
            <div class="search-slogan">
                穿过人群，勿忘修行。
            </div>
        </div>
    </div>
    
    <div class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
        
        <div id="graph-view" class="active">
            <div id="d3-container" style="width:100%; height:600px;"></div>
            <div class="graph-popover" id="graphPopover"></div>
            <div id="graph-loading" style="position: absolute; top:50%; left:50%; transform:translate(-50%, -50%); color: var(--text-secondary);">
                <i data-feather="loader" class="spin"></i> 星图构建中...
            </div>
        </div>

        <div id="timeline-view"></div>

    </div>

    <script>
        let allArticles = []; 
        let simulation;  
        let autoShowTimer; // 自动轮播计时器
        let isUserInteracting = false; // 用户是否正在干扰（悬停或拖拽）
        // ===1、总调度
        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();       
            await loadData();  
            feather.replace();  //图标库，替换成SVG图标
            
            window.addEventListener('scroll', () => {
                const header = document.getElementById('mainHeader');
                if(window.scrollY > 10) header.classList.add('scrolled');
                else header.classList.remove('scrolled');
            });     //监听用户向下滚动页面，给导航栏增加效果
            
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            // 搜索框实时响应，触发handleSearch函数
        });
        // ===2、数据引擎
        async function loadData() {
            try {
                const res = await fetch('data/articles.json');
                const data = await res.json();
                
                // 现在数据结构变了，articles 在 nodes 字段里
                allArticles = data.nodes || [];
                const semanticLinks = data.links || [];

                // 确保文章按日期排序
                allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
                // 指挥渲染两个视图
                initGraphView(allArticles, semanticLinks);     
                renderTimelineView(allArticles); 
                //移动端切换列表视图
                if (window.innerWidth <= 768) switchView('timeline'); 

                console.log("全量索引加载完毕，全文搜索已就绪。");
            } catch (error) {
                console.error("Data Load Error", error);
            }
        }
        // ===3、搜索功能
        function handleSearch(e) {
            const term = e.target.value.toLowerCase().trim();   //预处理输入内容
            
            // 如果正在星图模式输入，自动切换到列表模式查看结果
            if(term && document.getElementById('graph-view').classList.contains('active')) {
                switchView('timeline');
            }
            // 搜索框空了，显示全部
            if (!term) {
                renderTimelineView(allArticles);
                return;
            }
            // 全文过滤，同时检查四个地方能否匹配上
            const filtered = allArticles.filter(a => {
                const inTitle = (a.title || '').toLowerCase().includes(term);
                const inTags = (a.tags || []).join(' ').toLowerCase().includes(term);
                const inExcerpt = (a.excerpt || '').toLowerCase().includes(term);
                const inContent = (a.fullContent || '').toLowerCase().includes(term);
                return inTitle || inTags || inExcerpt || inContent;
            });

            renderTimelineView(filtered, term);     // 显示过滤后的文章并传入关键词用以高亮
        }
        // ===4、视图转换
        window.switchView = function(viewName) {
            const graphBtn = document.getElementById('btnGraph');
            const timelineBtn = document.getElementById('btnTimeline');
            const graphView = document.getElementById('graph-view');
            const timelineView = document.getElementById('timeline-view');

            if (viewName === 'graph') {
                graphBtn.classList.add('active');
                timelineBtn.classList.remove('active');
                graphView.classList.add('active');
                timelineView.classList.remove('active');
                if(simulation) simulation.alpha(0.3).restart(); 
                startAutoShow(); 
            } else {
                graphBtn.classList.remove('active');
                timelineBtn.classList.add('active');
                graphView.classList.remove('active');
                timelineView.classList.add('active');
                stopAutoShow(); 
            }
        }

        function initGraphView(articles, semanticLinks) {
            const loadingElement = document.getElementById('graph-loading');
            if(loadingElement) loadingElement.style.display = 'none';
            
            const container = document.getElementById('d3-container');
            if(!container) return;
            
            const width = container.clientWidth;
            const height = container.clientHeight;

            // 清除可能存在的旧 SVG
            d3.select("#d3-container").select("svg").remove();

            const nodes = articles.map(a => ({ 
                ...a,
                id: a.file, 
                group: (a.tags?.[0] || 'Misc')
            }));    //创建节点
            
            // 直接使用传入的语义连线，不再在前端循环计算
            const links = semanticLinks.map(l => ({...l}));

            const svg = d3.select("#d3-container").append("svg")
                .attr("width", "100%").attr("height", "100%")
                .attr("viewBox", [0, 0, width, height]);

            const color = d3.scaleOrdinal().range(["#a3a3a3", "#737373","#d4d4d4", "#525252"]);
            const getRadius = d => Math.sqrt(d.char_count || 400) / 10 + 5; //计算半径

            simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links)
                    .id(d => d.id)
                    .distance(d => 180 - (d.weight || 0.5) * 150) // 相似度越高，距离越短
                ) 
                .force("charge", d3.forceManyBody().strength(-350)) //排斥力，拉远
                .force("collide", d3.forceCollide(d => getRadius(d) + 8)) //碰撞力，不重叠
                .force("center", d3.forceCenter(width / 2, height / 2)) //向心力
                .force("x", d3.forceX(width / 2).strength(0.06)) 
                .force("y", d3.forceY(height / 2).strength(0.06)); 

            const link = svg.append("g")
                .attr("stroke", "var(--text-secondary)")
                .attr("stroke-opacity", 0.2)
                .selectAll("line")
                .data(links)
                .join("line")
                .attr("stroke-width", d => (d.weight || 0.5) * 10); // 权重越高线越粗
            link.append("title")
                .text(d => `相关度: ${Math.round(d.weight * 100)}%`);

            const node = svg.append("g")
                .selectAll("circle").data(nodes).join("circle")
                .attr("class", "graph-node")
                .attr("r", d => getRadius(d))
                .attr("fill", d => color(d.group))
                .attr("stroke", "#fff").attr("stroke-width", 1.5)
                .attr("cursor", "pointer")
                .call(drag(simulation));

            node.on("click", (event, d) => {
                window.location.href = `Reading.html?file=${encodeURIComponent(d.file)}`;
            });

            node.on("mouseover", function(event, d) {
                isUserInteracting = true;
                showPopover(event.clientX, event.clientY, d, d3.select(this));
            }).on("mouseout", function(event, d) {
                isUserInteracting = false;
                hidePopover(d3.select(this), d);
            });

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
            });

            function drag(simulation) {
                function dragstarted(event) { 
                    isUserInteracting = true;
                    if (!event.active) simulation.alphaTarget(0.3).restart(); 
                    event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; 
                }
                function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
                function dragended(event) { 
                    isUserInteracting = false;
                    if (!event.active) simulation.alphaTarget(0); 
                    event.subject.fx = null; event.subject.fy = null; 
                }
                return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
            }

            function showPopover(clientX, clientY, d, d3Node) {
                const currentR = getRadius(d);
                d3Node.transition().duration(400).ease(d3.easeBackOut)
                    .attr("r", currentR + 6) 
                    .attr("fill", "#002FA7")
                    .attr("stroke", "#002FA7")
                    .attr("stroke-opacity", 1.6)
                    .attr("stroke-width", 8);
                
                const popover = document.getElementById('graphPopover');
                popover.className = 'graph-popover visible';
                const tagsHtml = (d.tags || []).map(tag => `<span class="popover-tag">${tag}</span>`).join(' ');

                popover.innerHTML = `
                    <div class="popover-meta">
                        <span class="popover-tags-container">${tagsHtml}</span>
                        <span>${d.date}</span>
                    </div>
                    <h3 class="popover-title">${d.title}</h3>
                    <div class="popover-excerpt">${d.excerpt || '探索更多宇宙细节...'}</div>
                `;
                
                let left = clientX + 20;
                let top = clientY - 20;
                if (left + 320 > window.innerWidth) left = clientX - 320;
                if (top + 200 > window.innerHeight) top = window.innerHeight - 220;

                popover.style.left = left + "px";
                popover.style.top = top + "px";
                popover.style.pointerEvents = "none";
            }

            function hidePopover(d3Node, d) {
                d3Node.transition().duration(400)
                    .attr("r", getRadius(d))
                    .attr("fill", color(d.group))
                    .attr("stroke", "#fff").attr("stroke-width", 1.5).attr("stroke-opacity", 1);
                document.getElementById('graphPopover').className = 'graph-popover';
            }

            function startAutoShow() {
                if (autoShowTimer) clearInterval(autoShowTimer);
                autoShowTimer = setInterval(() => {
                    if (isUserInteracting || document.hidden) return; 

                    const randomIndex = Math.floor(Math.random() * nodes.length);
                    const selectedNodeData = nodes[randomIndex];
                    const d3Node = svg.selectAll(".graph-node").filter(d => d.id === selectedNodeData.id);

                    const svgRect = container.getBoundingClientRect();
                    const screenX = selectedNodeData.x + svgRect.left;
                    const screenY = selectedNodeData.y + svgRect.top;

                    showPopover(screenX, screenY, selectedNodeData, d3Node);

                    setTimeout(() => {
                        if (!isUserInteracting) hidePopover(d3Node, selectedNodeData);
                    }, 3000);

                }, 5000);
            }

            function stopAutoShow() {
                clearInterval(autoShowTimer);
            }

            startAutoShow();
        }

        function renderTimelineView(articles, term = '') {
            const container = document.getElementById('timeline-view');
            if(articles.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding: 60px; color: var(--text-secondary);">暂无包含 "${term}" 的信号...</p>`;
                return;
            }

            container.innerHTML = articles.map(item => `
                <div class="timeline-item" onclick="this.classList.toggle('fixed')">
                    <div class="timeline-marker"></div>
                    <div class="timeline-content-row">
                        <span class="timeline-date">${item.date}</span>
                        <h2 class="timeline-title">
                            <a href="Reading.html?file=${encodeURIComponent(item.file)}${term ? '&keyword=' + encodeURIComponent(term) : ''}" 
                            onclick="event.stopPropagation()">${item.title}</a>
                        </h2>
                    </div>
                    <p class="timeline-excerpt">${item.excerpt || '无摘要内容...'}</p>
                </div>
            `).join('');
        }

        function initTheme() {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) document.body.classList.add('dark-mode');
            updateThemeIcon();
        }
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            updateThemeIcon();
        }
        function updateThemeIcon() {
            const icon = document.body.classList.contains('dark-mode') ? 'sun' : 'moon';
            const iconContainer = document.getElementById('themeIcon');
            if(iconContainer && feather.icons[icon]) {
                iconContainer.innerHTML = feather.icons[icon].toSvg({ width: 18 });
            }
        }
    </script>
</body>
</html>
